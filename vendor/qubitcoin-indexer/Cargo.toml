[package]
name = "qubitcoin-indexer"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "In-process WASM secondary indexer runtime for Qubitcoin"

[dependencies]
qubitcoin-indexer-core = { path = "../qubitcoin-indexer-core" }
rocksdb = { version = "0.21.0", features = ["multi-threaded-cf"] }
tracing = "0.1"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1.10"
tokio = { version = "1", features = ["full"] }
wasmtime = "18.0.4"
prost = "0.12"
sha2 = "0.10"
toml = "0.8"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full"] }
wat = "1.0"

[build-dependencies]
prost-build = "0.12"
