[package]
name = "qubitcoin-script"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Script types and opcodes for Qubitcoin: Script, ScriptNum, Opcode enum, ScriptVerifyFlags"

[dependencies]
qubitcoin-primitives = { path = "../qubitcoin-primitives" }
qubitcoin-crypto = { path = "../qubitcoin-crypto" }
qubitcoin-serialize = { path = "../qubitcoin-serialize" }
thiserror = "1"
bitflags = "2"
hex = "0.4"

[dev-dependencies]
serde_json = "1"
