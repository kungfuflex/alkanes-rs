[package]
name        = "frtun-http-async"
version     = "0.1.0"
edition     = "2021"
license     = "MIT OR Apache-2.0"
description = "Engine-agnostic async HTTP/1.1 client over tokio + upstream rustls. Vendored from ~/frtun/crates/frtun-http-async (2026-06-10) — internal helper for the wc-signer-native pair-wake POST."

[lib]
path = "src/lib.rs"

[dependencies]
# Pinned at vendor time. The alkanes-rs workspace pins tokio at 1.43.0
# (without features) and doesn't pre-pin tokio-rustls / rustls-pki-types /
# webpki-roots / httparse at the workspace level. These mirror the
# `wc-signer-native` feature gate's deps in
# `~/alkanes-rs-develop/crates/alkanes-cli-common/Cargo.toml`. Keep this
# in sync with that side; bumping one without the other risks two copies
# of the same engine showing up in the dep tree.
tokio              = { workspace = true, features = ["net", "io-util", "time"] }
tokio-rustls       = { version = "0.26", default-features = false, features = ["tls12"] }
rustls             = { version = "0.23", default-features = false, features = ["std", "tls12", "ring"] }
rustls-pki-types   = "1"
webpki-roots       = "1.0"
httparse           = "1"
url                = { workspace = true }
thiserror          = { workspace = true }

[dev-dependencies]
tokio              = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "io-util", "net", "time", "sync"] }
