events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml text/javascript;

    # Proxy to Artifact Registry
    server {
        listen 8080;
        server_name _;

        # Health check endpoint for Cloud Run
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # npm registry proxy
        location / {
            # Proxy to Artifact Registry
            proxy_pass https://us-central1-npm.pkg.dev/pkg-alkanes-build/npm-packages;

            # Preserve host header
            proxy_set_header Host us-central1-npm.pkg.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSL settings
            proxy_ssl_server_name on;
            proxy_ssl_name us-central1-npm.pkg.dev;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Cache settings
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;

            # Handle redirects
            proxy_redirect off;

            # Pass through npm authentication headers
            proxy_pass_request_headers on;
        }
    }
}
