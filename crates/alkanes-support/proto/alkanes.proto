syntax = "proto3";
package alkanes;
message uint128 {
  uint64 lo = 1;
  uint64 hi = 2;
}

message AlkaneId {
  uint128 block = 1;
  uint128 tx = 2;
}

message AlkaneTransfer {
  AlkaneId id = 1;
  uint128 value = 2;
}

message MultiSimulateRequest {
    repeated MessageContextParcel parcels = 1;
}

message MessageContextParcel {
  repeated AlkaneTransfer alkanes = 1;
  bytes transaction = 2;
  bytes block = 3;
  uint64 height = 4;
  uint32 txindex = 6;
  bytes calldata = 5;
  uint32 vout = 7;
  uint32 pointer = 8;
  uint32 refund_pointer = 9;
}

message KeyValuePair {
  bytes key = 1;
  bytes value = 2;
}

message ExtendedCallResponse {
  repeated AlkaneTransfer alkanes = 1;
  repeated KeyValuePair storage = 2;
  bytes data = 3;
}

message Context {
  AlkaneId myself = 1;
  AlkaneId caller = 2;
  repeated uint128 inputs = 3;
  uint32 vout = 4;
  repeated AlkaneTransfer incoming_alkanes = 5;
}

message TraceContext {
  Context inner = 1;
  uint64 fuel = 2;
}

enum AlkanesTraceCallType {
  NONE = 0;
  CALL = 1;
  DELEGATECALL = 2;
  STATICCALL = 3;
}

enum AlkanesTraceStatusFlag {
  SUCCESS = 0;
  FAILURE = 1;
}

message AlkanesEnterContext {
  AlkanesTraceCallType call_type = 1;
  TraceContext context = 2;
}

message AlkanesExitContext {
  AlkanesTraceStatusFlag status = 1;
  ExtendedCallResponse response = 2;
}

message AlkanesCreate {
  AlkaneId new_alkane = 1;
}

message AlkanesTraceEvent {
  oneof event {
    AlkanesEnterContext enter_context = 1;
    AlkanesExitContext exit_context = 2;
    AlkanesCreate create_alkane = 3;
    // align-main additive: develop-only trace events consumed by the portable
    // crates (alkanes-cli-common, alkanes-contract-indexer). Dead in the
    // indexer path — the root src/** indexer never constructs these. Additive
    // field numbers 4/5 do not renumber existing fields (wire-compatible).
    AlkanesReceiveIntent receive_intent = 4;
    AlkanesValueTransfer value_transfer = 5;
  }
}

// align-main additive (develop-only): backing messages for the receive_intent
// and value_transfer trace events. Not emitted by the indexer.
message AlkanesReceiveIntent {
  repeated AlkaneTransfer incoming_alkanes = 1;
}

message AlkanesValueTransfer {
  repeated AlkaneTransfer transfers = 1;
  uint32 redirect_to = 2;
}

message AlkanesBlockEvent {
    AlkanesTrace traces = 1;
    Outpoint outpoint = 2;
    uint64 txindex = 3;
}

message AlkanesBlockTraceEvent {
    repeated AlkanesBlockEvent events = 1;
}

message AlkanesTrace {
  repeated AlkanesTraceEvent events = 1;
}

message SimulateResponse {
  ExtendedCallResponse execution = 1;
  uint64 gas_used = 2;
  string error = 3;
}

message MultiSimulateResponse {
    repeated SimulateResponse responses = 1;
    string error = 2;
}

message AlkaneInventoryRequest {
  AlkaneId id = 1;
}

message AlkaneIdToOutpointRequest {
  AlkaneId id = 1;
}

message AlkaneInventoryResponse {
  repeated AlkaneTransfer alkanes = 1;
}

message AlkaneStorageRequest {
  AlkaneId id = 1;
  bytes path = 2;
}

message AlkaneStorageResponse {
  bytes value = 1;
}

message AlkaneIdToOutpointResponse {
  bytes txid = 1;
  uint32 vout = 2;
}

message Outpoint {
  bytes txid = 1;
  uint32 vout = 2;
}

message Trace {
  Outpoint outpoint = 1;
  AlkanesTrace trace = 2;
}

message TraceBlockRequest {
  uint64 block = 1;
}

message TraceBlockResponse {
  repeated Trace traces = 1;
}

message BytecodeRequest {
  AlkaneId id = 1;
}

message BlockRequest {
  uint32 height = 1;
}

message BlockResponse {
  bytes block = 1;
  uint32 height = 2;
}

message TransactionRequest {
  bytes txid = 1;
}

message TransactionResponse {
  bytes transaction = 1;
}

message Payment {
  Outpoint spendable = 1;
  bytes output = 2;
  bool fulfilled = 3;
}

message PendingUnwrapsResponse {
  repeated Payment payments = 1;
}

// ---------------------------------------------------------------------------
// simulatetransaction / simulateprotostones — view-mode full per-tx replay.
//
// Two-tier shape: `simulateprotostones` is the lower-level entry point
// (caller supplies alkane inputs + a list of protostones directly, with
// optional transaction/block bytes for `self.transaction()` / `self.block()`
// host calls and optional storage overrides). `simulatetransaction` wraps
// it: it decodes a PSBT or raw tx, derives the alkane inputs from the
// spent outpoints' live OUTPOINT_TO_RUNES state, auto-synthesizes a
// realistic-looking faux block chained off the last indexed header, then
// delegates to simulateprotostones. Both return the same response shape.
//
// The response includes the actual transaction + block bytes that were
// used (either provided or synthesized) so the developer can inspect them.
// Per protostone, we also surface the final state of every storage slot
// touched during the simulation, keyed by the alkane that owns it (since
// an alkane can extcall and mutate another alkane's storage).
// ---------------------------------------------------------------------------

message StorageOverride {
  AlkaneId alkane = 1;
  repeated KeyValuePair entries = 2;
}

message TouchedStorage {
  AlkaneId alkane = 1;
  repeated KeyValuePair entries = 2;
}

message VoutBalances {
  uint32 vout = 1;
  repeated AlkaneTransfer balances = 2;
}

message ProtostoneExecution {
  uint32 index = 1;
  Outpoint outpoint = 2;
  AlkanesTrace trace = 3;
  uint64 fuel_used = 4;
  repeated TouchedStorage touched_storage = 5;
}

message SimulateProtostonesRequest {
  uint64 height = 1;
  repeated AlkaneTransfer alkane_inputs = 2;
  // Enciphered protostones — exactly the bytes a runestone's protocol
  // field would carry. Client-side: build `Vec<Protostone>`, call
  // `protostones.encipher()` -> `Vec<u128>`, then
  // `encode_varint_list(...)` -> `Vec<u8>`. Server-side: decode and
  // pass into a synthetic `Runestone { protocol: Some(values) }` that
  // drives `Protorune::index_protostones`.
  bytes protostones = 3;
  // OPTIONAL — raw consensus-encoded bitcoin::Transaction. When set, the
  // view runs against this exact tx (so self.transaction() returns it
  // verbatim). When unset, a synthetic tx is constructed that just
  // carries the protostones in its OP_RETURN and routes outputs from
  // protostone.pointer fields.
  bytes transaction = 4;
  // OPTIONAL — raw consensus-encoded bitcoin::Block wrapping the tx
  // above. When unset, a faux block is synthesized; see
  // SimulateTransactionResponse.used_block for the bytes returned.
  bytes block = 5;
  repeated StorageOverride storage_overrides = 6;
}

message SimulateTransactionRequest {
  uint64 height = 1;
  // Raw consensus-encoded bitcoin::Transaction OR a PSBT envelope; both
  // accepted (PSBT first, falls back to raw on parse failure).
  bytes transaction = 2;
  repeated StorageOverride storage_overrides = 3;
}

message SimulateTransactionResponse {
  string txid = 1;
  uint64 height = 2;
  repeated ProtostoneExecution protostones = 3;
  repeated VoutBalances final_balances_by_vout = 4;
  uint64 total_fuel_used = 5;
  // Bytes of the bitcoin::Transaction that was actually run (either the
  // one the caller provided or the synthesized one).
  bytes used_transaction = 6;
  // Bytes of the bitcoin::Block that was actually run. For
  // simulateprotostones this is the provided block or a minimal
  // single-tx wrapper. For simulatetransaction this is the auto-
  // synthesized faux block — chained off the previous indexed block
  // header with a vanity nonce (CRC32-salted low bytes) so the bytes
  // are realistic-looking but unambiguously not real PoW.
  bytes used_block = 7;
  string error = 8;
}

// ---------------------------------------------------------------------------
// simulateblock — full block replay in a shared sandbox.
//
// Drives every tx in `block` through the same per-tx code path
// simulatetransaction uses, but with a SINGLE shared sandbox
// AtomicPointer that carries writes across tx boundaries. So if tx[1]
// spends an outpoint that tx[0] just created, tx[1] sees the alkanes
// tx[0] routed to that vout — same intra-block semantics the live
// indexer enforces. Zero on-disk side effects: the shared sandbox is
// never committed.
//
// Per-tx breakdown in the response is sufficient to graph the full
// asset flow across the block: each tx carries the same
// SimulateTransactionResponse shape (protostone traces, touched
// storage per alkane, final per-vout balance sheets, fuel used). The
// txs appear in `txs` in block order, with non-runestone txs (incl.
// coinbase) surfaced as empty-shape entries with `error =
// "no_runestone"` so the index alignment with `block.txdata` is
// preserved.
// ---------------------------------------------------------------------------

message SimulateBlockRequest {
  uint64 height = 1;
  // Raw consensus-encoded bitcoin::Block. Full block including coinbase.
  bytes block = 2;
  // Optional pre-execution storage overrides applied to the shared
  // sandbox atomic before tx[0] runs. All txs in the block see these.
  repeated StorageOverride storage_overrides = 3;
}

message SimulateBlockResponse {
  string block_hash = 1;
  uint64 height = 2;
  // One entry per tx in `block.txdata`, in block order. Coinbase /
  // no-runestone txs surface as empty entries with `error =
  // "no_runestone"` so the caller can map `txs[i]` back to
  // `block.txdata[i]` directly.
  repeated SimulateTransactionResponse txs = 3;
  // Sum of every protostone's fuel_used across every tx in the block
  // (matches the per-tx total_fuel_used summed).
  uint64 total_fuel_used = 4;
  // Echo of the block bytes that were run — so the caller has a
  // structured handle on what produced the response without having to
  // round-trip the request.
  bytes used_block = 5;
  string error = 6;
}
