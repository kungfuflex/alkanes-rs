[package]
name = "metashrew-core"
version = "9.0.1"
description = "metashrew indexer bindings"
repository = "https://github.com/sandshrewmetaprotocols/metashrew"
license = "MIT"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
bitcoin = "0.32.4"
bytes = "1.6.0"
cfg-if = "1.0.0"
wasm-bindgen = "0.2.114"
ordinals = { path = "../ordinals" }
prost.workspace = true
anyhow = "1.0.90"
wasm-bindgen-test = "0.3.50"
hex = "0.4.3"
metashrew-macros = { path = "../metashrew-macros" }
metashrew-support = { path = "../metashrew-support" }

[build-dependencies]
prost-build.workspace = true

[features]
test-utils = []
panic-hook = []
allocator = []
default = ["allocator"]
