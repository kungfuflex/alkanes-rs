[package]
name = "protorune"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
resolver = "2"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
test-utils = []
mainnet = []
cache = []
# Opt-in rune-balance tracking. The canonical alkanes indexer does NOT enable
# this — alkanes ignores runes/protoburns at the application layer, so its
# wasm build skips the rune-tracking surface (and the canonical-ord parity
# tests in `tests/ord_runes_parity.rs`). The feature exists for downstream
# protorune consumers that actually surface rune balances; the
# `fix(protorune): canonical ord runes indexing parity` patch (commit
# 47bd86b3, ported from kungfuflex/v2.1.8) lives here so those consumers can
# pick it up by enabling `--features runes`.
runes = []

[dependencies]
anyhow = { workspace = true }
bitcoin = { workspace = true }
metashrew-core = { workspace = true }
metashrew-support = { workspace = true }
protorune-support = { workspace = true }
ordinals = { workspace = true }
ruint = { workspace = true }
wasm-bindgen = { workspace = true }
byteorder = { workspace = true }
wasm-bindgen-test = { workspace = true }
once_cell = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
hex = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }

[dev-dependencies]
metashrew-core = { git = "https://github.com/sandshrewmetaprotocols/metashrew", features = ["test-utils"] }
getrandom = { version = "0.2.15", features = ["js"] }
protorune = { path = ".", features = ["test-utils"] }
